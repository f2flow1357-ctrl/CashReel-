        #userEmail { font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <div class="logo">CashReel</div>
                <div id="userEmail"></div>
            </div>
            <div id="authSection">
                <div class="balance" id="balanceDiv" style="display:none;">
                    <span id="userBalance">0.000$</span>
                    <span>💰</span>
                </div>
                <button class="logout-btn" id="logoutBtn" onclick="logoutUser()" style="display:none;">Logout</button>
            </div>
        </div>

        <div class="main" id="homePage">
            <h1>Earn <span>Unlimited Money</span><br>Watching Videos</h1>
            <p>Watch unlimited videos, each video gives you $0.003</p>
            <button class="btn" onclick="openAuthModal()">Start Earning Now</button>
        </div>

        <div class="main" id="dashboard">
            <h1>Welcome to CashReel 💰</h1>
            <p>Click the button and watch the ad to earn $0.003</p>
            <button class="btn" id="watchAdBtn" onclick="watchVideo()">Watch Ad & Earn Now</button>
        </div>
    </div>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 id="modalTitle">Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="loginUser()">Login</button>
            <button class="btn btn-secondary" onclick="signupUser()">Create New Account</button>
            <button class="btn btn-secondary" onclick="closeAuthModal()">Cancel</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyC8tq5Ry9yVhcKbumQlbU4NE4JLHd-RRgE",
          authDomain: "cashreel-f8198.firebaseapp.com",
          projectId: "cashreel-f8198",
          storageBucket: "cashreel-f8198.firebasestorage.app",
          messagingSenderId: "969237019203",
          appId: "1:969237019203:web:6e1c4124969d4f6f7c32f6",
          measurementId: "G-B56V81GGVK"
        };

        // 2. Your Adsterra Links - هاهو السمارت لينك هنا 👇
        const SMARTLINK_URL = "https://www.profitablecpmratenetwork.com/wyqf720j2p?key=e32d605e8d90f2fdb51e61e579728396";
        const SOCIAL_BAR_SCRIPT = `<script src="https://pl29085009.profitablecpmratenetwork.com/f1/b5/64/f1b564b85d4f11bc10413d8c7c15e0c7.js"><\/script>`;

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        let currentUser = null;

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                showDashboard(user);
                await loadUserBalance(user.uid);
            } else {
                currentUser = null;
                showHomePage();
            }
        });

        function showDashboard(user) {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('balanceDiv').style.display = 'flex';
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('userEmail').innerText = user.email;
        }

        function showHomePage() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('balanceDiv').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('userEmail').innerText = '';
        }

        function openAuthModal() {
            document.getElementById('authModal').style.display = 'flex';
        }

        function closeAuthModal() {
            document.getElementById('authModal').style.display = 'none';
        }

        function loginUser() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => closeAuthModal())
                .catch(error => alert('Error: ' + error.message));
        }

        function signupUser() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    return db.collection('users').doc(userCredential.user.uid).set({
                        email: email,
                        balance: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => closeAuthModal())
                .catch(error => alert('Error: ' + error.message));
        }

        function logoutUser() {
            auth.signOut();
        }

        async function loadUserBalance(uid) {
            const userDoc = await db.collection('users').doc(uid).get();
            if (userDoc.exists) {
                const balance = userDoc.data().balance || 0;
                document.getElementById('userBalance').innerText = balance.toFixed(3) + '$';
            }
        }

        async function watchVideo() {
            if (!currentUser) return;
            
            // Open Smartlink Ad - وهنا كايستعمل 👇
            window.open(SMARTLINK_URL, '_blank');

            // Update Balance
            const userRef = db.collection('users').doc(currentUser.uid);
            try {
                await db.runTransaction(async (transaction) => {
                    const userDoc = await transaction.get(userRef);
                    if (!userDoc.exists) throw "User does not exist!";
                    const newBalance = (userDoc.data().balance || 0) + 0.003;
                    transaction.update(userRef, { balance: newBalance });
                    document.getElementById('userBalance').innerText = newBalance.toFixed(3) + '$';
                });
            } catch (e) {
                console.error("Transaction failed: ", e);
            }
        }

        // Run SocialBar Script
        document.write(SOCIAL_BAR_SCRIPT);
    </script>
</body>
</html>
