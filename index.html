<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashReel - اربح من مشاهدة الفيديوهات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0f172a; color: white; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #334155; }
        .logo { font-size: 24px; font-weight: bold; color: #fbbf24; }
        .balance { background: #1e293b; padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px; }
        .main { text-align: center; margin-top: 80px; }
        .main h1 { font-size: 36px; margin-bottom: 15px; }
        .main h1 span { color: #fbbf24; }
        .main p { color: #94a3b8; margin-bottom: 30px; }
        .btn { background: linear-gradient(90deg, #fbbf24, #f59e0b); color: #0f172a; border: none; padding: 15px 40px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .logout-btn { background: #dc2626; color: white; padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        .modal-content h2 { margin-bottom: 20px; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        .modal-content .btn { width: 100%; margin-bottom: 10px; }
        .modal-content .btn-secondary { background: #334155; color: white; }
        
        #dashboard { display: none; }
        #userEmail { font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <div class="logo">CashReel</div>
                <div id="userEmail"></div>
            </div>
            <div id="authSection">
                <div class="balance" id="balanceDiv" style="display:none;">
                    <span id="userBalance">0.000$</span>
                    <span>💰</span>
                </div>
                <button class="logout-btn" id="logoutBtn" onclick="logoutUser()" style="display:none;">خروج</button>
            </div>
        </div>

        <div class="main" id="homePage">
            <h1>اربح <span>فلوس لا محدودة</span><br>من مشاهدة الفيديوهات</h1>
            <p>شاهد فيديوهات بلا حدود، كل فيديو يعطيك $0.003</p>
            <button class="btn" onclick="openAuthModal()">ابدأ الربح الآن</button>
        </div>

        <div class="main" id="dashboard">
            <h1>مرحبا بك فـ CashReel 💰</h1>
            <p>اضغط على الزر وشاهد الإعلان لتربح 0.003$</p>
            <button class="btn" id="watchAdBtn" onclick="watchVideo()">شاهد إعلان واربح الآن</button>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 id="modalTitle">تسجيل الدخول</h2>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button class="btn" onclick="loginUser()">تسجيل الدخول</button>
            <button class="btn btn-secondary" onclick="signupUser()">إنشاء حساب جديد</button>
            <button class="btn btn-secondary" onclick="closeAuthModal()">إلغاء</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. الكونفيج ديالك من Firebase ✅
        const firebaseConfig = {
          apiKey: "AIzaSyC8tq5Ry9yVhcKbumQlbU4NE4JLHd-RRgE",
          authDomain: "cashreel-f8198.firebaseapp.com",
          projectId: "cashreel-f8198",
          storageBucket: "cashreel-f8198.firebasestorage.app",
          messagingSenderId: "969237019203",
          appId: "1:969237019203:web:6e1c4124969d4f6f7c32f6",
          measurementId: "G-B56V81GGVK"
        };

        // 2. روابط Adsterra ديالك ✅
        const SMARTLINK_URL = "https://www.profitablecpmratenetwork.com/wyqf720j2p?key=e32d605e8d90f2fdb51e61e579728396";
        const SOCIAL_BAR_SCRIPT = `<script src="https://pl29085009.profitablecpmratenetwork.com/f1/b5/64/f1b564b85d4f11bc10413d8c7c15e0c7.js"><\/script>`;

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // هذا السطر مهم باش يبقى مسجل
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        let currentUser = null;

        // مراقبة حالة تسجيل الدخول
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // المستخدم مسجل
                currentUser = user;
                showDashboard(user);
                await loadUserBalance(user.uid);
            } else {
                // المستخدم غير مسجل
                currentUser = null;
                showHomePage();
            }
        });

        function showDashboard(user) {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('balanceDiv').style.display = 'flex';
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('userEmail').innerText = user.email;
        }

        function showHomePage() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('balanceDiv').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('userEmail').innerText = '';
        }

        function openAuthModal() {
            document.getElementById('authModal').style.display = 'flex';
        }

        function closeAuthModal() {
            document.getElementById('authModal').style.display = 'none';
        }

        function loginUser() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    closeAuthModal();
                })
                .catch(error => {
                    alert('خطأ: ' + error.message);
                });
        }

        function signupUser() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // إنشاء وثيقة للمستخدم الجديد في Firestore
                    return db.collection('users').doc(userCredential.user.uid).set({
                        email: email,
                        balance: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    closeAuthModal();
                })
                .catch(error => {
                    alert('خطأ: ' + error.message);
                });
        }

        function logoutUser() {
            auth.signOut();
        }

        async function loadUserBalance(uid) {
            const userDoc = await db.collection('users').doc(uid).get();
            if (userDoc.exists) {
                const balance = userDoc.data().balance || 0;
                document.getElementById('userBalance').innerText = balance.toFixed(3) + '$';
            }
        }

        async function watchVideo() {
            if (!currentUser) return;
            
            // 1. فتح إعلان Smartlink ✅
            window.open(SMARTLINK_URL, '_blank');

            // 2. زيادة الرصيد
            const userRef = db.collection('users').doc(currentUser.uid);
            try {
                await db.runTransaction(async (transaction) => {
                    const userDoc = await transaction.get(userRef);
                    if (!userDoc.exists) throw "User does not exist!";
                    const newBalance = (userDoc.data().balance || 0) + 0.003;
                    transaction.update(userRef, { balance: newBalance });
                    document.getElementById('userBalance').innerText = newBalance.toFixed(3) + '$';
                });
            } catch (e) {
                console.error("Transaction failed: ", e);
            }
        }

        // تشغيل كود SocialBar ✅
        document.write(SOCIAL_BAR_SCRIPT);
    </script>
</body>
</html>
